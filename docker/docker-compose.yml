version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tgbots-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: tgbots
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tgbots-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: tgbots-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/tgbots?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BASE_URL: ${BASE_URL}
    ports:
      - '4000:4000'

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: tgbots-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:80'

volumes:
  pgdata:
  redisdata:
